<section class="cart">
  <div class="container">
    <h1 class="title">
      Carrito
      <span class="count">({{ (itemCount$ | async) ?? 0 }})</span>
    </h1>

    <a class="continue" routerLink="/catalog" aria-label="Seguir comprando">
      <span aria-hidden="true">←</span> Seguir comprando
    </a>
  </div>

  <div class="container" *ngIf="(items$ | async) as items">
    <app-free-shipping
      *ngIf="items.length"
      class="full-banner"
      [target]="threshold"
      [subtotal]="(subtotal$ | async) ?? 0">
    </app-free-shipping>
  </div>

  <div class="container layout">
    <div class="cart-update-overlay" *ngIf="(busy$ | async) ?? false">
      <span class="cart-update-overlay__ring" aria-hidden="true"></span>
      <span>Actualizando carrito...</span>
    </div>

    <ng-container *ngIf="(items$ | async) as items; else loading">
      <ng-container *ngIf="items.length; else empty">
        <div class="left">
          <div class="surface surface--table">
            <header class="table-head" aria-hidden="true">
              <div>Producto</div>
              <div>Precio</div>
              <div>Cantidad</div>
              <div>Total</div>
              <div></div>
            </header>

            <div class="list">
              <app-cart-item
                *ngFor="let it of items"
                [item]="it"
                [busy]="(busy$ | async) ?? false"
                (qtyChange)="setQty(it.id, $event)"
                (remove)="remove(it.id)">
              </app-cart-item>
            </div>
          </div>
        </div>

        <div class="right">
          <app-order-summary></app-order-summary>
        </div>
      </ng-container>
    </ng-container>

    <ng-template #empty>
      <app-cart-empty></app-cart-empty>
    </ng-template>

    <ng-template #loading>
      <div class="skeleton container">Cargando...</div>
    </ng-template>
  </div>

  <section class="cart-recos" aria-label="Recomendaciones para tu carrito">
    <app-cart-recommendations></app-cart-recommendations>
  </section>
</section>
