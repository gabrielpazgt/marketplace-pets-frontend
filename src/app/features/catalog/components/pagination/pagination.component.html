<nav class="pager" aria-label="Paginación">
  <button class="pager__nav" [disabled]="page === 1" aria-label="Primera página" (click)="first()">
    <mat-icon>first_page</mat-icon>
  </button>
  <button class="pager__nav" [disabled]="page === 1" aria-label="Página anterior" (click)="prev()">
    <mat-icon>chevron_left</mat-icon>
  </button>

  <ng-container *ngFor="let p of pages">
    <span *ngIf="p === 'gap'" class="gap">…</span>

    <button *ngIf="p !== 'gap'"
            class="num"
            [class.is-active]="isActive(p)"
            [attr.aria-current]="ariaCurrent(p)"
            (click)="goPage(p)">
      {{ p }}
    </button>
  </ng-container>

  <button class="pager__nav" [disabled]="page === totalPages" aria-label="Página siguiente" (click)="next()">
    <mat-icon>chevron_right</mat-icon>
  </button>
  <button class="pager__nav" [disabled]="page === totalPages" aria-label="Última página" (click)="last()">
    <mat-icon>last_page</mat-icon>
  </button>
</nav>
