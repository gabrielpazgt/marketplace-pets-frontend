<section class="section pets-list-page">
  <div class="container">
    <header class="pets-list-head">
      <div>
        <p class="pets-list-head__eyebrow">Cuenta / Mis mascotas</p>
        <h2>Mis mascotas</h2>
        <p class="muted">Crea perfiles para personalizar recomendaciones y comprar más rápido para cada una.</p>
      </div>

      <button class="btn primary" type="button" (click)="goNew()">Agregar mascota</button>
    </header>

    <div class="pets-empty" *ngIf="pets.length === 0">
      <div class="pets-empty__icon">+</div>
      <h3>Agrega tu primera mascota</h3>
      <p>Guarda su perfil para tener recomendaciones, filtros y accesos rápidos en la tienda.</p>
      <button class="btn primary" type="button" (click)="goNew()">Crear perfil</button>
    </div>

    <div class="pets-grid" *ngIf="pets.length > 0">
      <mp-pet-card
        *ngFor="let pet of pets"
        [pet]="pet"
        (edit)="onEdit($event)"
        (remove)="onRemove($event)"
      ></mp-pet-card>

      <button class="pets-add-card" type="button" (click)="goNew()">
        <span class="pets-add-card__icon">+</span>
        <strong>Agregar una nueva mascota</strong>
        <span>Crea otro perfil para recomendaciones personalizadas.</span>
      </button>
    </div>
  </div>
</section>
