<section class="pet-preview-card" [style.--pet-color]="draft.avatarHex || '#ffd7a1'">
  <div class="pet-preview-card__hero">
    <img class="pet-preview-card__image" [src]="visualImage" [alt]="title" />
  </div>

  <div class="pet-preview-card__body">
    <h3>{{ title }}</h3>
    <p>{{ subtitle }}</p>

    <dl class="pet-preview-card__stats">
      <div>
        <dt>Género</dt>
        <dd>{{ sexText }}</dd>
      </div>
      <div>
        <dt>Edad</dt>
        <dd>{{ ageText }}</dd>
      </div>
      <div>
        <dt>Peso</dt>
        <dd>{{ weightText }}</dd>
      </div>
      <div>
        <dt>Esterilizado</dt>
        <dd [class.is-positive]="draft.sterilized">{{ sterilizedText }}</dd>
      </div>
    </dl>

    <div class="pet-preview-card__group" *ngIf="activityText">
      <span class="pet-preview-card__label">ACTIVIDAD</span>
      <div class="pet-preview-card__chips">
        <span class="pet-preview-card__chip">{{ activityText }}</span>
      </div>
    </div>

    <div class="pet-preview-card__group" *ngIf="dietChips.length">
      <span class="pet-preview-card__label">DIETA</span>
      <div class="pet-preview-card__chips">
        <span class="pet-preview-card__chip pet-preview-card__chip--accent" *ngFor="let diet of dietChips">
          {{ diet }}
        </span>
      </div>
    </div>

    <div class="pet-preview-card__group" *ngIf="allergyChips.length">
      <span class="pet-preview-card__label">ALERGIAS</span>
      <div class="pet-preview-card__chips">
        <span class="pet-preview-card__chip pet-preview-card__chip--warning" *ngFor="let allergy of allergyChips">
          {{ allergy }}
        </span>
      </div>
    </div>
  </div>
</section>
