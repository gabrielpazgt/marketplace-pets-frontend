<article class="pet-card">
  <div class="pet-card__media" [class.has-photo]="hasCustomPhoto" [style.--pet-color]="pet.avatarHex || '#ff6f0f'">
    <img class="pet-card__image" [class.pet-card__image--fit]="!hasCustomPhoto" [src]="coverImage" [alt]="pet.name" loading="lazy" />

    <button class="pet-card__edit" (click)="edit.emit(pet)" [attr.aria-label]="'Editar ' + pet.name">
      <mat-icon>edit</mat-icon>
    </button>

    <span class="pet-card__age" *ngIf="ageLabel">{{ ageLabel }}</span>
  </div>

  <div class="pet-card__body">
    <h3>{{ pet.name }}</h3>
    <p>{{ subtitle }}</p>

    <dl class="pet-card__facts" *ngIf="pet.sex || weightLabel">
      <div *ngIf="pet.sex">
        <dt>Género</dt>
        <dd>{{ sexLabel[pet.sex] }}</dd>
      </div>
      <div *ngIf="weightLabel">
        <dt>Peso</dt>
        <dd>{{ weightLabel }}</dd>
      </div>
    </dl>
  </div>

  <div class="pet-card__footer">
    <a
      class="pet-card__cta"
      [routerLink]="['/catalog']"
      [queryParams]="{ pet: pet.id }"
      [attr.aria-label]="'Comprar para ' + pet.name"
    >
      Comprar para {{ pet.name }}
    </a>

    <button class="pet-card__remove" (click)="remove.emit(pet)" [attr.aria-label]="'Eliminar ' + pet.name">
      <mat-icon>delete_outline</mat-icon>
    </button>
  </div>
</article>
