<section class="deals container" aria-labelledby="deals-title">
  <div class="head">
    <h2 id="deals-title" class="title">Destacados</h2>

    <a class="btn ghost" routerLink="/catalog" aria-label="Ver todos los productos destacados">
      Ver todo <span aria-hidden="true">-></span>
    </a>
  </div>

  <ng-container *ngIf="view.length; else skeleton">
    <div class="grid" role="list">
      <a
        class="prod"
        role="listitem"
        *ngFor="let p of view"
        [routerLink]="['/catalog/product', p.slug]"
        [title]="p.name"
      >
        <span
          class="badge"
          *ngIf="p.badge"
          [ngClass]="'badge--' + (p.badge || '').toLowerCase()"
        >
          {{ p.badge }}
        </span>

        <figure class="media">
          <img [src]="p.image" [alt]="p.name" loading="lazy" />
          <span class="glow" aria-hidden="true"></span>
        </figure>

        <div class="info">
          <div class="name line-clamp">{{ p.name }}</div>

          <div class="prices">
            <div class="price-chip price--regular" aria-label="Precio actual">
              <span class="label">Precio normal</span>
              <div class="vals">
                <span class="now">
                  {{ p.price | currency:'GTQ':'symbol-narrow':'1.0-0' }}
                </span>
              </div>
            </div>

            <div class="price-chip price--member" aria-label="Precio con membresia">
              <span class="label">Con membresia ({{ membershipDiscountPct }}%)</span>
              <div class="vals">
                <span class="now">
                  {{ memberPrice(p.price) | currency:'GTQ':'symbol-narrow':'1.0-0' }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </a>
    </div>
  </ng-container>

  <ng-template #skeleton>
    <div class="grid">
      <div class="prod skel" *ngFor="let i of [1,2,3,4,5,6,7,8]">
        <div class="media skel"></div>
        <div class="info">
          <div class="name skel skel--text"></div>
          <div class="prices">
            <div class="price-chip skel skel--pill"></div>
          </div>
        </div>
      </div>
    </div>
  </ng-template>
</section>
