<section class="deals container" aria-labelledby="deals-title">
  <div class="head">
    <h2 id="deals-title" class="title">Destacados</h2>

    <a class="btn ghost" routerLink="/catalog" aria-label="Ver todos los productos destacados">
      Ver todo <span aria-hidden="true">-></span>
    </a>
  </div>

  <ng-container *ngIf="view.length; else skeleton">
    <div class="grid" role="list">
      <a
        class="prod"
        role="listitem"
        *ngFor="let p of view; let i = index"
        [routerLink]="['/catalog/product', p.slug]"
        [title]="p.name"
        mpFadeIn
        [mpFadeInDelay]="i * 40"
      >
        <span
          class="badge"
          *ngIf="p.badge"
          [ngClass]="'badge--' + (p.badge || '').toLowerCase()"
        >
          {{ p.badge }}
        </span>

        <figure class="media">
          <img [src]="p.image" [alt]="p.name" loading="lazy" />
          <span class="glow" aria-hidden="true"></span>
        </figure>

        <div class="info">
          <div class="name line-clamp">{{ p.name }}</div>

          <div class="pricing">
            <div class="price-main">
              <span class="price-now">{{ p.price | currency:'GTQ':'symbol-narrow':'1.0-0' }}</span>
              <span *ngIf="p.oldPrice" class="price-old">{{ p.oldPrice | currency:'GTQ':'symbol-narrow':'1.0-0' }}</span>
            </div>
            <div class="price-member">
              <span class="member-star" aria-hidden="true">★</span>
              <span class="member-label">Con membresía</span>
              <span class="member-val">{{ memberPrice(p.price) | currency:'GTQ':'symbol-narrow':'1.0-0' }}</span>
            </div>
          </div>
        </div>
      </a>
    </div>
  </ng-container>

  <ng-template #skeleton>
    <div class="grid">
      <div class="prod skel" *ngFor="let i of [1,2,3,4,5,6,7,8]">
        <div class="media skel"></div>
        <div class="info">
          <div class="name skel skel--text"></div>
          <div class="prices">
            <div class="price-chip skel skel--pill"></div>
          </div>
        </div>
      </div>
    </div>
  </ng-template>
</section>
