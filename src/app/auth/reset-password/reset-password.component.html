<div class="auth-wrap">
  <aside class="panel">
    <div class="content">
      <h1 class="title-panel">Nueva contraseña</h1>
      <p class="subtitle">Crea una contraseña nueva para proteger tu cuenta.</p>
    </div>
    <img src="assets/images/login.svg" class="image" alt="reset password image" />
  </aside>

  <main class="card form-card">
    <header class="form-head">
      <h2>Restablecer contraseña</h2>
      <p class="muted">Ingresa y confirma tu nueva contraseña.</p>
    </header>

    <div class="error-text server-error" *ngIf="codeMissing">
      El enlace de recuperación no es válido o ya no contiene el código requerido.
    </div>

    <form *ngIf="!codeMissing" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span class="label">Nueva contraseña</span>
        <div class="input-wrap input-wrap--password">
          <input class="input" [type]="hide ? 'password' : 'text'" formControlName="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
          <button
            type="button"
            class="eye"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="hide ? 'Mostrar contraseña' : 'Ocultar contraseña'"
          >
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <small class="field-hint" [class.error-text]="passwordError">{{ passwordError || ' ' }}</small>
      </label>

      <label class="field">
        <span class="label">Confirmar contraseña</span>
        <div class="input-wrap input-wrap--password">
          <input class="input" [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" placeholder="Repite tu contraseña" autocomplete="new-password" />
          <button
            type="button"
            class="eye"
            (click)="toggleConfirmPasswordVisibility()"
            [attr.aria-label]="hideConfirm ? 'Mostrar contraseña' : 'Ocultar contraseña'"
          >
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <small class="field-hint" [class.error-text]="confirmPasswordError">{{ confirmPasswordError || ' ' }}</small>
      </label>

      <p class="error-text server-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" class="btn primary full" [disabled]="submitting">
        <span *ngIf="!submitting">Guardar nueva contraseña</span>
        <span class="spinner" *ngIf="submitting"></span>
      </button>
    </form>

    <p class="muted center mt-2">
      <a class="link brand" routerLink="/auth/login" [queryParams]="{ returnUrl: returnUrl }">Volver a iniciar sesión</a>
    </p>
  </main>
</div>
