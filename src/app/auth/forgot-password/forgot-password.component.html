<div class="auth-wrap">
  <aside class="panel">
    <div class="content">
      <h1 class="title-panel">Recuperar acceso</h1>
      <p class="subtitle">Te enviaremos un enlace para restablecer tu contraseña.</p>
    </div>
    <img src="assets/images/login.svg" class="image" alt="forgot password image" />
  </aside>

  <main class="card form-card">
    <header class="form-head">
      <h2>Olvidé mi contraseña</h2>
      <p class="muted">Ingresa tu correo para enviar un enlace de recuperación.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span class="label">Correo electrónico</span>
        <input class="input" type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email" />
        <small class="field-hint" [class.error-text]="emailError">{{ emailError || ' ' }}</small>
      </label>

      <p class="success-text" *ngIf="sent">
        Si el correo existe, te enviamos un enlace para restablecer tu contraseña.
      </p>

      <p class="error-text server-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" class="btn primary full" [disabled]="submitting || sent">
        <span *ngIf="!submitting">Enviar enlace</span>
        <span class="spinner" *ngIf="submitting"></span>
      </button>

      <p class="muted center mt-2">
        <a class="link brand" routerLink="/auth/login" [queryParams]="{ returnUrl: returnUrl }">Volver a iniciar sesión</a>
      </p>
    </form>
  </main>
</div>
